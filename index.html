<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素地牢猎手 - Pixel Dungeon Hunter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050202;
            background: radial-gradient(ellipse at center, #1a0510 0%, #050202 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #game-container {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 4px solid #4a1a2a;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(100, 0, 20, 0.4), 0 0 60px rgba(100, 0, 20, 0.2);
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <script src="phaser.min.js"></script>
    
    <script src="game_v5.js"></script>
</body>
</html>
